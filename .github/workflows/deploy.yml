name: Build and Deploy to Somee

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Publish
        run: dotnet publish -c Release --no-build -o ./publish

      - name: Deploy to Somee via lftp
        run: |
          lftp -c "set ssl:verify-certificate no; set net:timeout 30; open ftp://ashir_ali:developer@72@155.254.244.30; mirror -R --verbose --ignore-time --parallel=5 ./publish/ /www.boostinghub.somee.com/"
